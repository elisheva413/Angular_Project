<div class="cart-page-container" dir="rtl">
  <div class="cart-card">
    <div class="cart-header">
      <h1>סל הקניות שלי</h1>
      <span class="item-count">{{ cartItems.length }} פריטים</span>
    </div>

    <div class="cart-content" *ngIf="cartItems.length > 0; else emptyCart">
      <div class="cart-items-list">
        <div *ngFor="let item of cartItems" class="cart-item">
          
          <div class="item-image">
            <img [src]="getProductImagePath(item)" 
                 [alt]="item.product.productsName" 
                 onerror="this.src='assets/images/placeholder.png'">
          </div>
          
          <div class="item-details">
            <h3 class="product-name">{{ item.product.productsName }}</h3>
            <p class="product-price">{{ item.product.price | number:'1.2-2' }} ₪</p>
          </div>

          <div class="item-actions">
            <div class="quantity-controls">
              <input type="number" 
                     class="simple-qty-input"
                     [(ngModel)]="item.selectedQuantity" 
                     min="1" 
                     [max]="item.product.quantity"
                     (change)="updateQuantity(item.product.productsId, item.selectedQuantity)">
            </div>
            
            <button class="simple-btn-delete" (click)="removeItem(item.product.productsId)">
              <i class="pi pi-trash"></i>
            </button>
          </div>
          
        </div>
      </div>

      <div class="cart-summary">
        <h3>סיכום הזמנה</h3>
        <div class="summary-row">
          <span>סכום ביניים:</span>
          <span>{{ getTotalPrice() | number:'1.2-2' }} ₪</span>
        </div>
        <hr>
        <div class="summary-row total">
          <span>סה"כ לתשלום:</span>
          <span>{{ getTotalPrice() | number:'1.2-2' }} ₪</span>
        </div>
        <button class="simple-btn-checkout">המשך לתשלום</button>
      </div>
    </div>

    <ng-template #emptyCart>
      <div class="empty-state">
        <i class="pi pi-shopping-bag empty-icon"></i>
        <h2>הסל שלך ריק</h2>
        <button class="simple-btn-return" routerLink="/products">חזרה לחנות</button>
      </div>
    </ng-template>
  </div>
</div>
