<div class="card">
  <div
    class="media"
    (mouseenter)="onEnter()"
    (mouseleave)="onLeave()"
    (touchstart)="onTouchToggle($event)"
  >
    <a [routerLink]="['/products', product?.productsId]" class="img-wrapper-link">
      <img class="img" [src]="currentImageSrc" [alt]="product?.productsName" />
    </a>

    <button
      type="button"
      class="top-cart-btn"
      [class.added]="isAddedToCart"
      (click)="onAddToCartClick($event)"
      aria-label="הוספה לסל"
    >
      <i class="pi" [ngClass]="isAddedToCart ? 'pi-check' : 'pi-shopping-bag'"></i>
    </button>
  </div>

  <div class="info">
    <a [routerLink]="['/products', product?.productsId]" class="name-link">
      <div class="name">{{ product?.productsName }}</div>
    </a>
    <div class="price">₪{{ product?.price }}</div>
  </div>
</div>
