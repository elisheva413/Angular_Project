<div class="filter-trigger-bar">
  <button class="filter-btn" (click)="toggleDrawer()">
    <i class="pi pi-sliders-h"></i>
    <span>סינון מוצרים</span>
  </button>
</div>

<div class="side-drawer" [class.open]="isOpen">
  <div class="drawer-header">
    <button class="close-btn" (click)="toggleDrawer()">✕</button>
    <h3>סינון</h3>
  </div>

  <div class="drawer-content">
    
    <details open>
      <summary>מתכת</summary>
      <div class="color-list">
        <div class="color-row" *ngFor="let m of materials" (click)="selectedMaterial = m.value" [class.active]="selectedMaterial === m.value">
          <span class="color-circle" [ngClass]="m.cssClass"></span>
          <span class="color-name">{{ m.name }}</span>
        </div>
        <div class="color-row" (click)="selectedMaterial = ''" [class.active]="selectedMaterial === ''">
          <span class="color-circle no-color"></span>
          <span class="color-name">כל המתכות</span>
        </div>
      </div>
    </details>

    <hr>

    <details open>
      <summary>צבע</summary>
      <div class="color-list">
        <div class="color-row" *ngFor="let c of colors" (click)="selectedColor = c.value" [class.active]="selectedColor === c.value">
          <span class="color-circle" [ngClass]="c.cssClass"></span>
          <span class="color-name">{{ c.name }}</span>
        </div>
        <div class="color-row" (click)="selectedColor = ''" [class.active]="selectedColor === ''">
          <span class="color-circle no-color"></span>
          <span class="color-name">כל הצבעים</span>
        </div>
      </div>
    </details>

    <hr>

    <details open>
      <summary>מחיר</summary>
      <div class="price-range-wrapper">
        <div class="price-labels">
          <span>₪{{minPrice}}</span>
          <span>₪{{maxPrice}}</span>
        </div>
        
        <div class="dual-slider-container">
          <div class="slider-track-bg"></div>
          
          <div class="slider-track-fill"
               [style.right.%]="(minPrice / maxLimit) * 100"
               [style.width.%]="((maxPrice - minPrice) / maxLimit) * 100">
          </div>

          <input type="range" [min]="0" [max]="maxLimit" step="10"
                 [(ngModel)]="minPrice" (input)="onMinChange()" class="range-input">
                 
          <input type="range" [min]="0" [max]="maxLimit" step="10"
                 [(ngModel)]="maxPrice" (input)="onMaxChange()" class="range-input">
        </div>
      </div>
    </details>

  </div>

  <div class="drawer-footer">
    <button class="btn-clear" (click)="resetFilters()">נקי הכל</button>
    <button class="btn-apply" (click)="applyFilters()">החל סינון</button>
  </div>
</div>

<div class="overlay" *ngIf="isOpen" (click)="toggleDrawer()"></div>
